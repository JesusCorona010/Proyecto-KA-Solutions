<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montserrat - Desarrollo Web</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/estilos.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <nav class="nav">
            <div class="logo">Desarrollo Web</div>
            <ul class="nav-menu">
                <li>DHOIR</li>
                <li>AME</li>
                <li>NOMG</li>
                <li class="cta">HON RETS</li>
            </ul>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="particles-container" id="particles"></div>
        <div class="hero-content">
            <h1>KA Solutions</h1>
            <h2>Creando soluciones digitales</h2>
            <button class="cta-button">COM NORS</button>
        </div>
    </section>

    <!-- Second Section -->
    <section class="second-section">
        <div class="section-content">
            <div class="left-content">
                <div class="section-indicators">
                    <div class="indicator active"></div>
                    <div class="indicator"></div>
                    <div class="indicator"></div>
                </div>
                <div class="section-text">
                    <h3>Montserrat</h3>
                    <h4>text</h4>
                    <button class="section-button">COM NORS</button>
                </div>
            </div>
            <div class="right-content">
                <div class="terminal-header">
                    <div class="terminal-dot red"></div>
                    <div class="terminal-dot yellow"></div>
                    <div class="terminal-dot green"></div>
                </div>
                <div class="terminal-content">
                    <div class="code-line">
                        <span class="syntax-comment">// Desarrollando soluciones innovadoras</span>
                    </div>
                    <div class="code-line">
                        <span class="syntax-keyword">function</span> <span class="syntax-function">crearExperiencia</span>() {
                    </div>
                    <div class="code-line">
                        &nbsp;&nbsp;<span class="syntax-keyword">return</span> <span class="syntax-string">"Código que transforma ideas"</span>;
                    </div>
                    <div class="code-line">};</div>
                    <div style="position: absolute; bottom: 20px; right: 20px; font-size: 12px;">
                        <span style="color: #00d4ff;">Montserrat</span><br>
                        <span style="color: #666;">text</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="nav-arrow">→</div>
    </section>

    <script src="script.js"></script>
</body>
</html>
